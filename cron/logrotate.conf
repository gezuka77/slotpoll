# SlotPoll Log Rotation Configuration
# Retains logs for 90 days in compliance with privacy policy

/var/log/demo-cleanup.log /var/log/gdpr-cleanup.log {
    # Rotate daily
    daily

    # Keep logs for 90 days
    rotate 90

    # Compress old logs (saves disk space)
    compress
    delaycompress

    # Create new log file with these permissions after rotation
    create 0644 root root

    # Don't error if log file is missing
    missingok

    # Don't rotate if log is empty
    notifempty

    # Use date as suffix for rotated files
    dateext
    dateformat -%Y%m%d

    # Keep extension (.log) after rotation
    extension .log
}
